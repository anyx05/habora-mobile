name: myapp
description: "SadamaAgent — vessel berth booking app for Estonian ports."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Supabase
  supabase_flutter: ^2.8.4

  # State management
  riverpod: ^2.6.1
  flutter_riverpod: ^2.6.1
  hooks_riverpod: ^2.6.1
  flutter_hooks: ^0.21.0

  # Navigation
  go_router: ^14.8.1

  # HTTP
  dio: ^5.7.0

  # Maps
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # Offline cache
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Push notifications
  firebase_core: ^3.13.0
  firebase_messaging: ^15.2.5

  # i18n
  intl: ^0.20.2

  # Fonts
  google_fonts: ^6.2.1

  # Code generation
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Env
  flutter_dotenv: ^5.2.1

  # SVG
  flutter_svg: ^2.0.17

  # URL launching (maps directions)
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.14
  freezed: ^2.5.7
  json_serializable: ^6.9.0

flutter:
  uses-material-design: true

  assets:
    - .env

  generate: true
